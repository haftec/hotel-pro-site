<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Oasis Hotel | Luxury Stay</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; line-height: 1.6; color: #333; }
        nav { background: #1a1a1a; color: #fff; padding: 1rem; text-align: center; }
        .hero { 
            background: #2c3e50; color: white; height: 400px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .container { padding: 2rem; max-width: 1100px; margin: auto; display: flex; gap: 20px; }
        .card { border: 1px solid #ddd; padding: 1.5rem; border-radius: 10px; flex: 1; text-align: center; }
        .btn { background: #d4af37; color: white; padding: 0.7rem 1.5rem; text-decoration: none; border-radius: 5px; }
        footer { text-align: center; padding: 2rem; background: #f4f4f4; margin-top: 2rem; }
    </style>
</head>
<body>
    <nav>
        <h2>GRAND OASIS</h2>
    </nav>

    <section class="hero">
        <h1>Experience Luxury & Comfort</h1>
        <p>Book your dream room in the heart of the city.</p>
        <a href="#rooms" class="btn">Explore Rooms</a>
    </section>

    <div class="container" id="rooms">
        <div class="card">
            <h3>Deluxe Room</h3>
            <p>$199 / Night</p>
            <a href="#" class="btn">Book Now</a>
        </div>
        <div class="card">
            <h3>Executive Suite</h3>
            <p>$399 / Night</p>
            <a href="#" class="btn">Book Now</a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Grand Oasis Hotel. All Rights Reserved.</p>
    </footer>
</body>
</html>
